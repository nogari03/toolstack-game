<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wasm Board Games</title>
</head>

<body>
  <button id="theme-toggle">🌙 Dark Mode</button>
  <div id="app">
    <h1>Wasm Board Games</h1>
    <div id="game-menu" class="win95-menu">
      <div class="notice-header">
        <h3>Game Select</h3>
      </div>
      <div class="menu-body">
        <button class="menu-btn active" data-game="chess">Chess</button>
        <button class="menu-btn" data-game="chess2">Chess 2</button>
        <button class="menu-btn" data-game="janggi">Janggi</button>
        <button class="menu-btn" data-game="minesweeper">Minesweeper</button>
        <button class="menu-btn" data-game="2048">2048</button>
        <button class="menu-btn" data-game="racing">Racing</button>
        <button class="menu-btn" data-game="claw">Claw Machine</button>
      </div>
    </div>

    <div id="board-container">
      <div id="board"></div>
    </div>
    <p id="status">Welcome to WebAssembly Board Games!</p>
    <button id="reset-button"
      style="display: none; margin: 10px auto; padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: 1px solid #888; background-color: #333; color: white;">Reset
      Game</button>

    <div id="leaderboard-section" class="notice-board">
      <div class="notice-header" style="justify-content: space-between;">
        <h3>Leaderboard</h3>
        <button id="sync-leaderboard-btn"
          style="background: var(--win-window-bg); border: none; box-shadow: inset 1px 1px var(--win-border-white), inset -1px -1px var(--win-border-black), inset 2px 2px var(--win-border-light), inset -2px -2px var(--win-border-dark); padding: 2px 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; color: var(--win-text);">⟳</button>
      </div>
      <div class="notice-body">
        <div class="notice-row header">
          <span class="rank-col">Rank</span>
          <span class="user-col">User ID</span>
          <span class="score-col">Score</span>
        </div>
        <div id="leaderboard-list">
          <div style="padding: 15px; text-align: center; color: #888;">Select a game to see records.</div>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
