<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wasm Board Games</title>
</head>

<body>
  <div id="app">
    <h1>Wasm Board Games</h1>
    <div id="controls" style="margin-bottom: 20px;">
      <label for="game-selector">Select Game: </label>
      <select id="game-selector">
        <option value="chess">Chess</option>
        <option value="janggi">Janggi</option>
        <option value="minesweeper">Minesweeper</option>
        <option value="2048">2048</option>
        <option value="racing">Racing</option>
        <option value="claw">Claw Machine</option>
      </select>
    </div>
    <div id="board-container">
      <div id="board"></div>
    </div>
    <p id="status">Welcome to WebAssembly Board Games!</p>
    <button id="reset-button"
      style="display: none; margin: 10px auto; padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: 1px solid #888; background-color: #333; color: white;">Reset
      Game</button>

    <div id="leaderboard-section" class="notice-board">
      <div class="notice-header">
        <h3>Leaderboard</h3>
      </div>
      <div class="notice-body">
        <div class="notice-row header">
          <span class="rank-col">Rank</span>
          <span class="user-col">User ID</span>
          <span class="score-col">Score</span>
        </div>
        <div id="leaderboard-list">
          <div style="padding: 15px; text-align: center; color: #888;">Select a game to see records.</div>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
